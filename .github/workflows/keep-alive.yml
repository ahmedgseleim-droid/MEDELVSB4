name: Keep Alive

on:
  schedule:
    - cron: '0 12 * * *'   # every day at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API (touches database)
        run: |
          curl -f https://medelvsb3.onrender.com/healthz || curl -f https://medelvsb3.onrender.com/health || echo 'Ping completed'